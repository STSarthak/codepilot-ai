server:
  port: 8080

spring:
  application:
    name: codepilot-ai
  ai:
    openai:
      api-key: ${OPENAPI_KEY}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai/
      chat:
        options:
          model: gemini-2.5-flash
          temperature: 0.0


  datasource:
    url: jdbc:postgresql://localhost:9000/testDB?options=-c TimeZone=Asia/Kolkata
    username: testUser
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET TIME ZONE 'Asia/Kolkata'

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format-sql: true
        jdbc:
          time_zone: Asia/Kolkata

jwt:
  secret-key: ${JWT_SECRET_KEY}

stripe:
  api:
    secret: ${STRIPE_SECRET_KEY}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET_KEY}

client.url: http://localhost:8080
